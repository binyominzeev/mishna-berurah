<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>משנה ברורה</title>
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ───────────────────────────────────────────── */
    body {
      font-family: 'David', 'Times New Roman', 'FreeSerif', serif;
      background: #ede5d0;
      color: #1a1208;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: #2c1810;
      color: #f5e6c8;
      padding: 8px 18px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 2px solid #a07828;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .header-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
    }

    .app-title {
      font-size: 1.25rem;
      font-weight: bold;
      color: #f5e6c8;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }

    .sep { color: #a07828; flex-shrink: 0; user-select: none; }

    .nav-section {
      border: 1px solid #6a4f0e;
      border-radius: 6px;
      padding: 4px 6px;
      background: rgba(255, 248, 231, 0.08);
      min-width: 0;
      flex: 1 1 360px;
    }

    .nav-section-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .collapse-toggle {
      width: 24px;
      min-width: 24px;
      height: 24px;
      padding: 0;
      font-weight: bold;
      line-height: 1;
    }

    .collapsible-content {
      margin-top: 5px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .nav-section.collapsed .collapsible-content {
      display: none;
    }

    .header-nav.collapsed {
      display: none;
    }

    /* Siman control */
    .siman-control {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px;
      white-space: nowrap;
    }

    .siman-control label {
      font-size: 0.88rem;
      color: #d4bc88;
    }

    .siman-control input[type="number"] {
      width: 56px;
      padding: 3px 5px;
      border: 1px solid #a07828;
      border-radius: 4px;
      background: #fff8e7;
      color: #1a1208;
      font-family: inherit;
      font-size: 0.9rem;
      text-align: center;
      -moz-appearance: textfield;
    }
    .siman-control input[type="number"]::-webkit-outer-spin-button,
    .siman-control input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .siman-picker-dialog {
      border: 1px solid #6a4f0e;
      border-radius: 10px;
      padding: 0;
      background: #fdf8f0;
      color: #1a1208;
      width: min(92vw, 780px);
      max-height: min(78dvh, 720px);
      box-shadow: 0 18px 48px rgba(26, 18, 8, 0.28);
    }

    .siman-picker-dialog::backdrop {
      background: rgba(44, 24, 16, 0.5);
      backdrop-filter: blur(2px);
    }

    .siman-picker-body {
      display: flex;
      flex-direction: column;
      max-height: min(78dvh, 720px);
    }

    .siman-picker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid #d8c6a0;
    }

    .siman-picker-title {
      font-size: 1rem;
      font-weight: bold;
      color: #2c1810;
    }

    .siman-picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(68px, 1fr));
      gap: 8px;
      padding: 16px 18px 18px;
      overflow-y: auto;
    }

    .siman-picker-btn {
      min-height: 34px;
      text-align: center;
    }

    /* Buttons */
    .btn {
      padding: 3px 9px;
      border: 1px solid #a07828;
      border-radius: 4px;
      background: #fff8e7;
      color: #2c1810;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      line-height: 1.4;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .btn:hover:not(:disabled) { background: #f0d070; }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }
    .btn.active  { background: #8b6914; color: #fff; border-color: #6a4f0e; }

    /* Seif pager */
    .pager-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .pager-label {
      font-size: 0.82rem;
      color: #c8aa70;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #pager {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-wrap: wrap;
    }

    #siman-pager {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-wrap: wrap;
    }

    /* ── Main layout ────────────────────────────────────── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
      gap: 0;
    }

    /* Panels */
    .panel {
      overflow-y: auto;
      padding: 18px 22px 28px;
      direction: rtl;
    }

    .panel-sa {
      flex: 1;              /* takes ~62% of remaining width */
      background: #fdf8f0;
      border-left: 2px solid #c8a96e;
    }

    .panel-mb {
      flex: 0 0 38%;        /* fixed 38 % */
      background: #f5f0e4;
    }

    /* Panel inner header */
    .panel-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 7px;
      border-bottom: 1px solid #c8a96e;
    }

    .panel-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: bold;
      color: #2c1810;
    }

    .panel-name-toggle {
      border: none;
      background: transparent;
      padding: 0;
      color: #7a6040;
      font: inherit;
      cursor: pointer;
    }

    .panel-name-toggle:hover:not(:disabled) {
      color: #8b6914;
    }

    .panel-name-toggle:disabled {
      color: #2c1810;
      cursor: default;
      text-decoration: none;
    }

    .panel-ref {
      font-size: 0.78rem;
      color: #7a6040;
    }

    /* Text content */
    .text-body {
      line-height: 1.95;
      text-align: justify;
    }

    .text-sa { font-size: 1.15rem; }
    .text-mb { font-size: 0.98rem; }

    .text-body b    { font-size: 1.03em; }
    .text-body small { color: #555; }

    .mb-inline-marker {
      border: none;
      background: transparent;
      color: #3f2a10;
      font: inherit;
      font-size: 0.72em;
      font-weight: bold;
      padding: 0 2px;
      margin-inline: 1px;
      cursor: pointer;
      text-decoration: underline dotted;
      text-underline-offset: 1px;
      vertical-align: super;
      line-height: 1;
    }
    .mb-inline-marker:hover { color: #8b6914; }

    .bh-inline-marker {
      border: none;
      background: transparent;
      color: #8b6914;
      font: inherit;
      font-size: 0.72em;
      font-weight: bold;
      padding: 0 2px;
      margin-inline: 1px;
      cursor: pointer;
      vertical-align: super;
      line-height: 1;
    }
    .bh-inline-marker:hover { color: #5d4308; }

    .mb-seif-block {
      border-radius: 4px;
      transition: background-color 0.35s ease;
    }
    .mb-seif-block.highlighted {
      background: #f0d07066;
    }

    /* States */
    .msg-loading {
      text-align: center;
      padding: 40px 20px;
      color: #999;
      font-size: 0.95rem;
    }

    .msg-error {
      color: #b00;
      padding: 20px 0;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .msg-empty {
      color: #aaa;
      font-style: italic;
      padding: 16px 0;
      font-size: 0.9rem;
    }

    /* ── Responsive tweaks ──────────────────────────────── */
    @media (max-width: 900px) {
      .panel-sa  { flex: 1 1 58%; }
      .panel-mb  { flex: 0 0 42%; }
      .text-sa   { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="app-title">משנה ברורה</span>
    <button type="button" class="btn collapse-toggle" id="nav-toggle" aria-expanded="true" aria-controls="header-nav">−</button>
  </div>

  <div class="header-nav" id="header-nav">
    <div class="nav-section" id="siman-nav-section">
      <div class="nav-section-header">
        <span class="pager-label">סימנים:</span>
      </div>
      <div class="collapsible-content" id="siman-nav-content">
        <div class="siman-control">
          <label for="siman-input">סימן:</label>
          <input
            type="number"
            id="siman-input"
            min="1" max="697" value="1"
            onkeydown="if(event.key==='Enter') loadSiman()"
          />
          <button class="btn" onclick="loadSiman()">טען</button>
          <button type="button" class="btn" id="open-siman-picker">כל הסימנים</button>
        </div>
        <span class="sep">|</span>
        <div id="siman-pager"></div>
      </div>
    </div>

    <div class="nav-section" id="seif-nav-section">
      <div class="nav-section-header">
        <span class="pager-label">סעיפים:</span>
      </div>
      <div class="collapsible-content" id="seif-nav-content">
        <div class="pager-wrap">
          <div id="pager"></div>
        </div>
      </div>
    </div>
  </div>
</header>

<dialog class="siman-picker-dialog" id="siman-picker-dialog" aria-labelledby="siman-picker-title">
  <div class="siman-picker-body">
    <div class="siman-picker-header">
      <span class="siman-picker-title" id="siman-picker-title">בחירת סימן</span>
      <button type="button" class="btn" id="close-siman-picker">סגור</button>
    </div>
    <div class="siman-picker-grid" id="siman-picker-grid"></div>
  </div>
</dialog>

<main>
  <!-- ── Shulchan Arukh ─────────────────────────── -->
  <section class="panel panel-sa" id="sa-panel">
    <div class="panel-header">
      <span class="panel-name">שולחן ערוך אורח חיים</span>
      <span class="panel-ref" id="sa-ref"></span>
    </div>
    <div class="text-body text-sa" id="sa-text">
      <div class="msg-loading">טוען…</div>
    </div>
  </section>

  <!-- ── Mishna Berura ──────────────────────────── -->
  <section class="panel panel-mb" id="mb-panel">
    <div class="panel-header">
      <div class="panel-name">
        <button type="button" class="panel-name-toggle" id="commentary-toggle-mb" disabled>משנה ברורה</button>
        <span class="sep">|</span>
        <button type="button" class="panel-name-toggle" id="commentary-toggle-bh">ביאור הלכה</button>
      </div>
      <span class="panel-ref" id="mb-ref"></span>
    </div>
    <div class="text-body text-mb" id="mb-text">
      <div class="msg-loading">טוען…</div>
    </div>
  </section>
</main>

<script>
  'use strict';

  /* ── Hebrew numerals (1-40) ──────────────────────────── */
  const HEB_NUM = [
    '', 'א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ז', 'ח', 'ט', 'י',
    'יא', 'יב', 'יג', 'יד', 'טו', 'טז', 'יז', 'יח', 'יט', 'כ',
    'כא', 'כב', 'כג', 'כד', 'כה', 'כו', 'כז', 'כח', 'כט', 'ל',
    'לא', 'לב', 'לג', 'לד', 'לה', 'לו', 'לז', 'לח', 'לט', 'מ'
  ];
  const toHeb = n => (n > 0 && n < HEB_NUM.length) ? HEB_NUM[n] : String(n);
  const MAX_SIMAN = 697;
  const MAX_REASONABLE_SEIF = 499;
  const MAX_SEIF_DIGITS = 3;
  const HIGHLIGHT_DURATION_MS = 1300;
  const SIMAN_PAGER_WINDOW_SIZE = 9;
  const ELLIPSIS = '…';
  const POSSIBLE_SEIF_NUM_RE = new RegExp(`\\b\\d{1,${MAX_SEIF_DIGITS}}\\b`, 'g');
  const DEFAULT_ROUTE = { siman: 1, seif: 1 };

  /* ── App state ───────────────────────────────────────── */
  const st = {
    siman: 1,
    seif: 1,
    saSeifim: [],
    mbSeifim: [],
    bhSeifim: [],
    mbLinksBySeif: {},
    activeCommentary: 'mb',
    viewReqId: 0,
    highlightTimer: null
  };

  /* ── Sefaria API ─────────────────────────────────────── */
  const API = 'https://www.sefaria.org/api/v3/texts';

  async function apiFetch(url) {
    const res = await fetch(url, { headers: { accept: 'application/json' } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  function parseMbRef(ref) {
    if (typeof ref !== 'string') return [];
    const m = ref.match(/^Mishnah Berurah (\d+):(\d+)(?:-(\d+))?$/);
    if (!m) return [];
    const siman = Number(m[1]);
    const start = Number(m[2]);
    const end = Number(m[3] || m[2]);
    if (!siman || !start || !end || end < start) return [];
    const out = [];
    for (let i = start; i <= end; i++) out.push({ siman, seif: i });
    return out;
  }

  function parseMbRefLoose(text) {
    if (typeof text !== 'string') return [];
    const m = text.match(/Mishnah Berurah (\d+):(\d+)(?:-(\d+))?/);
    if (!m) return [];
    return parseMbRef(m[0]);
  }

  async function getLinkedMbSeifim(siman, seif) {
    if (!st.mbLinksBySeif[siman]) st.mbLinksBySeif[siman] = {};
    if (Object.prototype.hasOwnProperty.call(st.mbLinksBySeif[siman], seif)) {
      return st.mbLinksBySeif[siman][seif];
    }

    const anchorRef = `Shulchan Arukh, Orach Chayim.${siman}.${seif}`;
    const url = `https://www.sefaria.org/api/links/${encodeURIComponent(anchorRef)}`;
    const data = await apiFetch(url);
    const links = Array.isArray(data) ? data : [];

    const mbSet = new Set();
    links.forEach(item => {
      const isMB = item?.index_title === 'Mishnah Berurah'
        || item?.collectiveTitle?.en === 'Mishnah Berurah'
        || /^Mishnah Berurah /.test(item?.sourceRef || '')
        || /^Mishnah Berurah /.test(item?.ref || '');
      if (!isMB) return;

      const refs = [
        ...parseMbRef(item?.sourceRef),
        ...parseMbRef(item?.ref)
      ];
      refs.forEach(r => {
        if (r.siman === siman && r.seif > 0) mbSet.add(r.seif);
      });
    });

    const result = [...mbSet].sort((a, b) => a - b);
    st.mbLinksBySeif[siman][seif] = result;
    return result;
  }

  function areConsecutive(nums) {
    if (nums.length < 2) return true;
    for (let i = 1; i < nums.length; i++) {
      if (nums[i] !== nums[i - 1] + 1) return false;
    }
    return true;
  }

  function formatMbRef(siman, linkedMbSeifim, fallbackSeif) {
    if (!linkedMbSeifim.length) {
      return `סימן ${siman} ס״ק ${toHeb(fallbackSeif)}`;
    }

    if (linkedMbSeifim.length === 1) {
      return `סימן ${siman} ס״ק ${toHeb(linkedMbSeifim[0])}`;
    }

    if (areConsecutive(linkedMbSeifim)) {
      const first = linkedMbSeifim[0];
      const last = linkedMbSeifim[linkedMbSeifim.length - 1];
      return `סימן ${siman} ס״ק ${toHeb(first)}-${toHeb(last)}`;
    }

    return `סימן ${siman} ס״ק ${linkedMbSeifim.map(toHeb).join(', ')}`;
  }

  function renderMbHtml(linkedMbSeifim, fallbackSeif) {
    const sourceSeifim = linkedMbSeifim.length ? linkedMbSeifim : [fallbackSeif];
    const blocks = sourceSeifim
      .map(n => ({ n, html: st.mbSeifim[n - 1] || '' }))
      .filter(item => item.html);

    if (!blocks.length) return '<div class="msg-empty">אין משנה ברורה לסעיף זה</div>';

    return blocks.map(item => (
      `<div class="mb-seif-block" data-mb-seif-block="${item.n}"><small>ס״ק ${toHeb(item.n)}</small><div>${item.html}</div></div>`
    )).join('<hr style="border:none;border-top:1px solid #d8c6a0;margin:10px 0;">');
  }

  function formatBhRef(siman, seif) {
    return `סימן ${siman} סעיף ${toHeb(seif)}`;
  }

  function renderBhHtml(seif) {
    const entry = st.bhSeifim[seif - 1];
    if (!entry) return '<div class="msg-empty">אין ביאור הלכה לסעיף זה</div>';

    const parts = Array.isArray(entry)
      ? entry.filter(Boolean)
      : [entry].filter(Boolean);

    if (!parts.length) return '<div class="msg-empty">אין ביאור הלכה לסעיף זה</div>';

    return parts.map((html, index) => (
      `<div class="mb-seif-block" data-bh-block="${index + 1}"><small>ביאור ${index + 1}</small><div>${html}</div></div>`
    )).join('<hr style="border:none;border-top:1px solid #d8c6a0;margin:10px 0;">');
  }

  function getBhEntriesForSeif(seif) {
    const entry = st.bhSeifim[seif - 1];
    if (!entry) return [];
    return (Array.isArray(entry) ? entry : [entry]).filter(Boolean);
  }

  function extractBhLeadText(html) {
    const div = document.createElement('div');
    div.innerHTML = html || '';
    const bold = div.querySelector('b');
    const text = (bold?.textContent || '').replace(/\s+/g, ' ').trim();
    return text.replace(/[\-:]+$/g, '').trim();
  }

  function getBhLeadCandidates(lead) {
    if (!lead) return [];
    const words = lead.split(/\s+/).filter(Boolean);
    const candidates = [lead];

    for (let len = Math.min(words.length, 4); len >= 1; len--) {
      candidates.push(words.slice(0, len).join(' '));
    }

    return [...new Set(candidates.filter(Boolean))];
  }

  function insertMarkerAfterPhrase(root, phrase, markerFactory) {
    if (!phrase) return false;

    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        return node.nodeValue && node.nodeValue.trim()
          ? NodeFilter.FILTER_ACCEPT
          : NodeFilter.FILTER_REJECT;
      }
    });

    while (walker.nextNode()) {
      const node = walker.currentNode;
      const text = node.nodeValue;
      const idx = text.indexOf(phrase);
      if (idx === -1) continue;

      const afterIdx = idx + phrase.length;
      const matched = text.slice(idx, afterIdx);
      const before = text.slice(0, afterIdx);
      const after = text.slice(afterIdx);

      node.nodeValue = before;
      const marker = markerFactory(matched);
      node.parentNode.insertBefore(marker, node.nextSibling);
      if (after) node.parentNode.insertBefore(document.createTextNode(after), marker.nextSibling);
      return true;
    }

    return false;
  }

  function addBhInlineMarkers(div, seif) {
    const entries = getBhEntriesForSeif(seif);
    if (!entries.length) return;

    entries.forEach((html, index) => {
      const lead = extractBhLeadText(html);
      if (!lead) return;

      const candidates = getBhLeadCandidates(lead);
      for (const candidate of candidates) {
        const inserted = insertMarkerAfterPhrase(div, candidate, () => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'bh-inline-marker';
          btn.dataset.bhIndex = String(index + 1);
          btn.title = `ביאור הלכה ${index + 1}`;
          btn.textContent = '*';
          return btn;
        });
        if (inserted) break;
      }
    });
  }

  function toNumberIfValid(v) {
    const n = Number(v);
    return Number.isInteger(n) && n > 0 ? n : null;
  }

  function inferMarkerSeif(marker, siman) {
    const raw = [
      marker.textContent || '',
      marker.getAttribute('title') || '',
      marker.getAttribute('data-ref') || '',
      marker.getAttribute('data-segment') || '',
      marker.getAttribute('data-label') || '',
      marker.getAttribute('aria-label') || '',
      marker.getAttribute('href') || ''
    ].join(' ');

    const refs = parseMbRefLoose(raw);
    if (refs.length && refs[0].siman === siman) return refs[0].seif;

    const order = toNumberIfValid(marker.getAttribute('data-order'));
    if (order) return order;

    const nums = raw.match(POSSIBLE_SEIF_NUM_RE) || [];
    for (const token of nums) {
      const n = Number(token);
      if (n > 0 && n <= MAX_REASONABLE_SEIF && n !== siman) return n;
    }
    return null;
  }

  function renderSaHtml(rawHtml, linkedMbSeifim) {
    const div = document.createElement('div');
    div.innerHTML = rawHtml || '';

    const markers = [...div.querySelectorAll('i[data-commentator], i')];
    let seq = 0;

    markers.forEach(marker => {
      const commentator = (marker.getAttribute('data-commentator') || '').toLowerCase();
      const isMb = commentator.includes('mishnah berurah');
      if (!isMb) {
        marker.remove();
        return;
      }

      const inferred = inferMarkerSeif(marker, st.siman);
      const fallback = linkedMbSeifim[seq]
        || (linkedMbSeifim.length ? linkedMbSeifim[linkedMbSeifim.length - 1] : null);
      const mbSeif = inferred || fallback;
      seq += 1;

      if (!mbSeif) {
        marker.remove();
        return;
      }

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'mb-inline-marker';
      btn.dataset.mbSeif = String(mbSeif);
      btn.title = `ס״ק ${toHeb(mbSeif)}`;
      btn.textContent = toHeb(mbSeif);
      marker.replaceWith(btn);
    });

    addBhInlineMarkers(div, st.seif);

    /* Normalize whitespace introduced by marker replacements. */
    return div.innerHTML.replace(/ {2,}/g, ' ').trim();
  }

  function focusMbSeifBlock(mbSeif) {
    const panel = document.getElementById('mb-panel');
    const target = panel.querySelector(`[data-mb-seif-block="${mbSeif}"]`);
    if (!target) return;
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    target.classList.add('highlighted');
    if (st.highlightTimer) clearTimeout(st.highlightTimer);
    st.highlightTimer = setTimeout(() => target.classList.remove('highlighted'), HIGHLIGHT_DURATION_MS);
  }

  function focusBhBlock(bhIndex) {
    const panel = document.getElementById('mb-panel');
    const target = panel.querySelector(`[data-bh-block="${bhIndex}"]`);
    if (!target) return;
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    target.classList.add('highlighted');
    if (st.highlightTimer) clearTimeout(st.highlightTimer);
    st.highlightTimer = setTimeout(() => target.classList.remove('highlighted'), HIGHLIGHT_DURATION_MS);
  }

  /**
   * Extract Hebrew seifim array from a Sefaria v3 response.
   * Handles both flat (string[]) and nested (string[][]) text arrays.
   */
  function extractSeifim(data) {
    if (!data || !Array.isArray(data.versions) || !data.versions.length) return [];
    const ver = data.versions.find(v => v.language === 'he') || data.versions[0];
    if (!ver || !ver.text) return [];
    const t = ver.text;
    if (Array.isArray(t)) {
      return t.map(item => Array.isArray(item) ? (item.length ? item.join('<br>') : '') : (item || ''));
    }
    return [String(t)];
  }

  /**
   * Strip empty inline commentator markers from Shulchan Arukh HTML.
   * Keeps bold titles, <small> Rema notes, and regular text.
   */
  function cleanSA(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    div.querySelectorAll('i[data-commentator]').forEach(el => el.remove());
    return div.innerHTML.replace(/ {2,}/g, ' ').trim();
  }

  /* ── Load a siman ────────────────────────────────────── */
  function setSimanInputValue(siman) {
    document.getElementById('siman-input').value = String(siman);
  }

  function parsePositiveInt(value) {
    const parsed = Number.parseInt(value, 10);
    return Number.isInteger(parsed) && parsed > 0 ? parsed : null;
  }

  function readRouteState() {
    const raw = window.location.protocol === 'file:'
      ? window.location.hash.replace(/^#/, '')
      : window.location.pathname.replace(/^\/+|\/+$/g, '');

    if (!raw) return { ...DEFAULT_ROUTE };

    const [simanPart, seifPart] = raw.split('/');
    const siman = parsePositiveInt(simanPart);
    const seif = parsePositiveInt(seifPart);

    return {
      siman: siman && siman <= MAX_SIMAN ? siman : DEFAULT_ROUTE.siman,
      seif: seif || DEFAULT_ROUTE.seif
    };
  }

  function writeRouteState({ siman, seif }, mode = 'push') {
    const normalizedSiman = Math.min(Math.max(siman, 1), MAX_SIMAN);
    const normalizedSeif = Math.max(seif, 1);
    const route = `/${normalizedSiman}/${normalizedSeif}`;

    if (window.location.protocol === 'file:') {
      const hash = `#${normalizedSiman}/${normalizedSeif}`;
      if (window.location.hash === hash) return;
      const method = mode === 'replace' ? 'replaceState' : 'pushState';
      if (mode === 'replace') {
        window.history.replaceState({ siman: normalizedSiman, seif: normalizedSeif }, '', hash);
        return;
      }
      window.history[method]({ siman: normalizedSiman, seif: normalizedSeif }, '', hash);
      return;
    }

    if (window.location.pathname === route) return;
    const method = mode === 'replace' ? 'replaceState' : 'pushState';
    window.history[method]({ siman: normalizedSiman, seif: normalizedSeif }, '', route);
  }

  async function loadSiman(targetSiman = null, opts = {}) {
    const fromInput = parseInt(document.getElementById('siman-input').value, 10);
    const siman = Number.isInteger(targetSiman) ? targetSiman : fromInput;
    if (!siman || siman < 1 || siman > MAX_SIMAN) {
      alert(`אנא הכנס מספר סימן בין 1 ל-${MAX_SIMAN}`);
      return;
    }

    setSimanInputValue(siman);
    st.siman = siman;
    st.seif  = 1;
    st.saSeifim = [];
    st.mbSeifim = [];
    st.bhSeifim = [];
    st.mbLinksBySeif = {};
    st.viewReqId = 0;

    buildSimanPager();
    setLoading();

    try {
      const saUrl = `${API}/${encodeURIComponent('Shulchan Arukh, Orach Chayim ' + siman)}`;
      const mbUrl = `${API}/Mishnah_Berurah.${siman}`;
      const bhUrl = `${API}/Biur_Halacha.${siman}`;

      const [saData, mbData, bhData] = await Promise.all([
        apiFetch(saUrl),
        apiFetch(mbUrl).catch(() => null),
        apiFetch(bhUrl).catch(() => null),
      ]);

      st.saSeifim = extractSeifim(saData);
      st.mbSeifim = mbData ? extractSeifim(mbData) : [];
      st.bhSeifim = bhData ? extractSeifim(bhData) : [];

      if (!st.saSeifim.length) throw new Error('לא נמצא טקסט לסימן זה');

      const initialSeif = Number.isInteger(opts.initialSeif)
        ? Math.min(Math.max(opts.initialSeif, 1), st.saSeifim.length)
        : 1;

      buildPager(st.saSeifim.length);
      buildSimanPager();
      showSeif(initialSeif, { historyMode: opts.historyMode || 'push' });
    } catch (err) {
      document.getElementById('sa-text').innerHTML =
        `<div class="msg-error">שגיאה בטעינת הנתונים: ${escHtml(err.message)}</div>`;
      document.getElementById('mb-text').innerHTML = '';
    }
  }

  /* ── Build pager buttons ─────────────────────────────── */
  function buildPager(count) {
    const pager = document.getElementById('pager');
    pager.innerHTML = '';

    const prev = mkBtn('◄ הקודם', 'pager-prev', () => showSeif(st.seif - 1));
    pager.appendChild(prev);

    for (let i = 1; i <= count; i++) {
      const btn = mkBtn(String(i), null, () => showSeif(i));
      btn.dataset.seif = i;
      btn.title = `סעיף ${toHeb(i)}`;
      pager.appendChild(btn);
    }

    const next = mkBtn('הבא ►', 'pager-next', () => showSeif(st.seif + 1));
    pager.appendChild(next);
  }

  function buildSimanPager() {
    const pager = document.getElementById('siman-pager');
    pager.innerHTML = '';

    const prev = mkBtn('◄ הקודם', 'siman-prev', () => loadSiman(st.siman - 1));
    prev.disabled = st.siman <= 1;
    pager.appendChild(prev);

    const { start, end } = calculatePagerWindow(st.siman, MAX_SIMAN, SIMAN_PAGER_WINDOW_SIZE);

    const addSimanBtn = (n) => {
      const btn = mkBtn(String(n), null, () => loadSiman(n));
      btn.dataset.siman = n;
      btn.title = `סימן ${n}`;
      btn.classList.toggle('active', n === st.siman);
      pager.appendChild(btn);
    };

    if (start > 1) {
      addSimanBtn(1);
      if (start > 2) pager.appendChild(document.createTextNode(ELLIPSIS));
    }

    for (let i = start; i <= end; i++) addSimanBtn(i);

    if (end < MAX_SIMAN) {
      if (end < MAX_SIMAN - 1) pager.appendChild(document.createTextNode(ELLIPSIS));
      addSimanBtn(MAX_SIMAN);
    }

    const next = mkBtn('הבא ►', 'siman-next', () => loadSiman(st.siman + 1));
    next.disabled = st.siman >= MAX_SIMAN;
    pager.appendChild(next);
  }

  function buildSimanPicker() {
    const grid = document.getElementById('siman-picker-grid');
    grid.innerHTML = '';

    for (let i = 1; i <= MAX_SIMAN; i++) {
      const btn = mkBtn(String(i), null, async () => {
        closeSimanPicker();
        await loadSiman(i);
      });
      btn.type = 'button';
      btn.classList.add('siman-picker-btn');
      btn.dataset.siman = String(i);
      btn.title = `סימן ${i}`;
      btn.classList.toggle('active', i === st.siman);
      grid.appendChild(btn);
    }
  }

  function syncSimanPickerSelection() {
    document.querySelectorAll('#siman-picker-grid button[data-siman]').forEach(btn => {
      btn.classList.toggle('active', Number(btn.dataset.siman) === st.siman);
    });
  }

  function mkBtn(label, id, handler) {
    const b = document.createElement('button');
    b.className = 'btn';
    b.textContent = label;
    if (id) b.id = id;
    b.addEventListener('click', handler);
    return b;
  }

  function calculatePagerWindow(current, max, windowSize) {
    let start = Math.max(1, current - Math.floor(windowSize / 2));
    let end = Math.min(max, start + windowSize - 1);
    start = Math.max(1, end - windowSize + 1);
    return { start, end };
  }

  /* ── Display a seif ──────────────────────────────────── */
  async function showSeif(seif, opts = {}) {
    const max = st.saSeifim.length;
    if (seif < 1 || seif > max) return;
    const reqId = ++st.viewReqId;
    st.seif = seif;
    writeRouteState({ siman: st.siman, seif }, opts.historyMode || 'push');

    const saRefLabel = `סימן ${st.siman} סעיף ${toHeb(seif)}`;
    document.getElementById('sa-ref').textContent = saRefLabel;
    document.getElementById('mb-ref').textContent = st.activeCommentary === 'mb'
      ? `סימן ${st.siman} ס״ק ${toHeb(seif)}`
      : formatBhRef(st.siman, seif);

    const saHtml = st.saSeifim[seif - 1] || '';

    document.getElementById('sa-text').innerHTML =
      (saHtml ? cleanSA(saHtml) : '<div class="msg-empty">אין טקסט</div>');
    document.getElementById('mb-text').innerHTML = '<div class="msg-loading">טוען…</div>';

    /* Update pager button states */
    const prev = document.getElementById('pager-prev');
    const next = document.getElementById('pager-next');
    if (prev) prev.disabled = seif <= 1;
    if (next) next.disabled = seif >= max;

    document.querySelectorAll('#pager button[data-seif]').forEach(btn => {
      btn.classList.toggle('active', Number(btn.dataset.seif) === seif);
    });

    let linkedMbSeifim = [];
    try {
      linkedMbSeifim = await getLinkedMbSeifim(st.siman, seif);
    } catch (_) {
      linkedMbSeifim = [];
    }

    if (reqId !== st.viewReqId) return;

    document.getElementById('sa-text').innerHTML =
      (saHtml ? renderSaHtml(saHtml, linkedMbSeifim) : '<div class="msg-empty">אין טקסט</div>');

    if (st.activeCommentary === 'mb') {
      document.getElementById('mb-ref').textContent = formatMbRef(st.siman, linkedMbSeifim, seif);
      document.getElementById('mb-text').innerHTML = renderMbHtml(linkedMbSeifim, seif);
      if (opts.focusMbSeif) focusMbSeifBlock(opts.focusMbSeif);
    } else {
      document.getElementById('mb-ref').textContent = formatBhRef(st.siman, seif);
      document.getElementById('mb-text').innerHTML = renderBhHtml(seif);
      if (opts.focusBhIndex) focusBhBlock(opts.focusBhIndex);
    }

    /* Scroll both panels back to top */
    document.getElementById('sa-panel').scrollTop = 0;
    if (!opts.focusMbSeif) document.getElementById('mb-panel').scrollTop = 0;
  }

  /* ── Helpers ─────────────────────────────────────────── */
  function setLoading() {
    const html = '<div class="msg-loading">טוען…</div>';
    document.getElementById('sa-text').innerHTML = html;
    document.getElementById('mb-text').innerHTML = html;
    document.getElementById('pager').innerHTML = '';
    document.getElementById('sa-ref').textContent = '';
    document.getElementById('mb-ref').textContent = '';
  }

  function syncCommentaryToggle() {
    const mbBtn = document.getElementById('commentary-toggle-mb');
    const bhBtn = document.getElementById('commentary-toggle-bh');
    const mbActive = st.activeCommentary === 'mb';
    mbBtn.disabled = mbActive;
    bhBtn.disabled = !mbActive;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setAllNavCollapsed(collapsed) {
    document.getElementById('header-nav').classList.toggle('collapsed', collapsed);

    ['siman-nav-section', 'seif-nav-section'].forEach(sectionId => {
      document.getElementById(sectionId).classList.toggle('collapsed', collapsed);
    });

    const toggle = document.getElementById('nav-toggle');
    toggle.textContent = collapsed ? '+' : '−';
    toggle.setAttribute('aria-expanded', String(!collapsed));
  }

  function openSimanPicker() {
    const dialog = document.getElementById('siman-picker-dialog');
    syncSimanPickerSelection();
    if (typeof dialog.showModal === 'function') {
      dialog.showModal();
      return;
    }
    dialog.setAttribute('open', 'open');
  }

  function closeSimanPicker() {
    const dialog = document.getElementById('siman-picker-dialog');
    if (typeof dialog.close === 'function' && dialog.open) {
      dialog.close();
      return;
    }
    dialog.removeAttribute('open');
  }

  function initNavCollapsers() {
    const btn = document.getElementById('nav-toggle');
    btn.addEventListener('click', () => {
      const isCollapsed = document.getElementById('siman-nav-section').classList.contains('collapsed')
        && document.getElementById('seif-nav-section').classList.contains('collapsed');
      setAllNavCollapsed(!isCollapsed);
    });
  }

  function initSimanPicker() {
    const dialog = document.getElementById('siman-picker-dialog');
    document.getElementById('open-siman-picker').addEventListener('click', openSimanPicker);
    document.getElementById('close-siman-picker').addEventListener('click', closeSimanPicker);
    dialog.addEventListener('click', e => {
      if (e.target === dialog) closeSimanPicker();
    });
    dialog.addEventListener('cancel', e => {
      e.preventDefault();
      closeSimanPicker();
    });
  }

  function setActiveCommentary(type) {
    if (type !== 'mb' && type !== 'bh') return;
    if (st.activeCommentary === type) return;
    st.activeCommentary = type;
    syncCommentaryToggle();
    showSeif(st.seif);
  }

  function initCommentaryToggle() {
    document.getElementById('commentary-toggle-mb').addEventListener('click', () => setActiveCommentary('mb'));
    document.getElementById('commentary-toggle-bh').addEventListener('click', () => setActiveCommentary('bh'));
    syncCommentaryToggle();
  }

  function initRouteSync() {
    const applyRoute = () => {
      const { siman, seif } = readRouteState();
      loadSiman(siman, { initialSeif: seif, historyMode: 'replace' });
    };

    window.addEventListener('popstate', applyRoute);
    if (window.location.protocol === 'file:') {
      window.addEventListener('hashchange', applyRoute);
    }
  }

  /* ── Keyboard navigation ─────────────────────────────── */
  document.addEventListener('keydown', e => {
    if (e.target.closest('input, textarea, select, button, a')) return;
    if (e.key === 'ArrowRight') showSeif(st.seif - 1); /* RTL: right = back */
    if (e.key === 'ArrowLeft')  showSeif(st.seif + 1); /* RTL: left  = forward */
  });

  document.getElementById('sa-text').addEventListener('click', e => {
    const marker = e.target.closest('.mb-inline-marker');
    if (marker) {
      const mbSeif = Number(marker.dataset.mbSeif || 0);
      if (!mbSeif) return;
      if (st.activeCommentary !== 'mb') {
        setActiveCommentary('mb');
        showSeif(st.seif, { focusMbSeif: mbSeif });
        return;
      }
      showSeif(st.seif, { focusMbSeif: mbSeif });
      return;
    }

    const bhMarker = e.target.closest('.bh-inline-marker');
    if (!bhMarker) return;
    const bhIndex = Number(bhMarker.dataset.bhIndex || 0);
    if (!bhIndex) return;
    if (st.activeCommentary !== 'bh') {
      setActiveCommentary('bh');
      showSeif(st.seif, { focusBhIndex: bhIndex });
      return;
    }
    focusBhBlock(bhIndex);
  });

  /* ── Bootstrap ───────────────────────────────────────── */
  buildSimanPicker();
  initNavCollapsers();
  initSimanPicker();
  initCommentaryToggle();
  initRouteSync();
  buildSimanPager();
  const initialRoute = readRouteState();
  loadSiman(initialRoute.siman, { initialSeif: initialRoute.seif, historyMode: 'replace' });
</script>
</body>
</html>
